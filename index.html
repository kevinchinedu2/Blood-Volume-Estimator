<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BVE</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
     
  <div class="auth-container">
    <div>
      <span class="header">Blood Volume Estimator</span>
      <h5>Welcome to BVE. Join now and start checking your health status.</h5>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('register')">Register</button>
      <button class="tab-btn" onclick="switchTab('login')">Login</button>
    </div>

    <div id="register" class="form-content active">
      <form id="register-form">
        <div class="form-group">
          <input type="text" id="reg-fname" required>
          <label for="reg-fname">Firstname</label>
        </div>
        <div class="form-group">
          <input type="text" id="reg-lname" required>
          <label for="reg-lname">Lastname</label>
        </div>
        <div class="form-group">
          <input type="email" id="reg-email" required>
          <label for="reg-email">Email</label>
        </div>
        <div class="form-group">
          <input type="password" id="reg-password" required>
          <label for="reg-password">Password</label>
        </div>
        <div class="form-group">
          <input type="password" id="reg-confirm-password" required>
          <label for="reg-confirm-password">Repeat Password</label>
        </div>
        <button type="submit">Register</button>
      </form>
    </div>
     <div id="message-box" style="display:none; text-align:center; font-weight:bold; margin-bottom: 15px; padding: 10px; border-radius: 5px;"></div>
    <div id="login" class="form-content">
      <form id="login-form">
        <div class="form-group">
          <input type="email" id="login-email" placeholder="email@example.com" required>
          <label for="login-email">Email Address</label>
        </div>
        <div class="form-group">
          <input type="password" id="login-password" required>
          <label for="login-password">Password</label>
        </div>
         <button class="button" type="submit">Login</button>
      </form>
      
      <div class="footer-text">
        If you can't login, click <label id="forgot-password-link" style="cursor: pointer; margin-top: 8px; margin-left: 2px; color: dark-blue;">forgotten password</label><br>
        or<br> <button class="switch-btn" onclick="switchTab('register')">REGISTER</button>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
