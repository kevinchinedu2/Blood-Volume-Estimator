<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>

<body>
<nav class="navbar">
  <div class="dropdown">
    <button type="button" onclick="toggleMenu()" class="dropbtn">Menu ☰</button>
    <div id="myDropdown" class="dropdown-content">
      <a href="index.html">Dashboard</a>
      <a href="history.html">History</a>
      <a href="about.html">About</a>
      <a href="login.html" class="logout-btn">Log-out</a>
    </div>
  </div>
</nav>

<div class="profile-container">
  <h2>My Profile</h2>
  
  <form id="profileForm">
    <div class="avatar-upload">
      <img id="avatarPreview" src="https://via.placeholder.com/100" alt="">
      <label for="fileInput">Change Profile Picture</label>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullname" placeholder="Enter your full name">
    </div>
    
    <div class="form-group">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Genotype</label>
      <select id="genotype">
        <option value="">Select Genotype</option>
        <option value="AA">AA</option>
        <option value="AS">AS</option>
        <option value="SS">SS</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Blood Group</label>
      <select id="blood_group">
        <option value="">Select Blood Group</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="example@gmail.com">
    </div>
    
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number">
    </div>
    
    <button type="submit" id="updateBtn" disabled>Save Changes</button>
  </form>
</div>
</body>
<script src="profile.js"></script>
 </script>
</html>
